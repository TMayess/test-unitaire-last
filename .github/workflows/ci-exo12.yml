name: 12 - Tests Maven Rooms & Reservations API

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  test-and-reports:
    name: Exécuter les tests et publier les rapports
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Java 17 avec cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Vérifier Java et Maven
        run: |
          java -version
          mvn -version

      - name: Lancer les tests et générer les rapports
        run: mvn clean verify
        working-directory: exo12

      - name: Publier les rapports de tests Maven
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-tests-maven-exo12
          path: |
            exo12/target/surefire-reports/**
            exo12/target/failsafe-reports/**
          if-no-files-found: warn

      - name: Publier le rapport de couverture JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-jacoco-exo12
          path: exo12/target/site/jacoco/**
          if-no-files-found: warn

      - name: Publier les rapports Cucumber BDD
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-cucumber-bdd-exo12
          path: exo12/target/cucumber-reports/**
          if-no-files-found: warn
